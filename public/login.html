<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bici — entrar</title>
  <link rel="icon" href="/icons/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="/icons/favicon-16.png" sizes="16x16" type="image/png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚲</text></svg>" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0d0c0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="bici" />
  <script>if('serviceWorker' in navigator){addEventListener('load',function(){navigator.serviceWorker.register('/sw.js');});}</script>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/buttons.css" />
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body class="login-body">
  <main class="login-card">
    <h1 class="login-title">bici</h1>
    <p class="login-sub">dónde dejé la bici</p>

    <form method="post" action="/login" class="login-form">
      <label class="sr-only" for="login-user">usuario</label>
      <input
        id="login-user"
        type="text"
        name="username"
        placeholder="usuario"
        autofocus
        required
        autocomplete="username"
        autocapitalize="none"
        autocorrect="off"
        spellcheck="false"
      />
      <label class="sr-only" for="login-pass">contraseña</label>
      <input
        id="login-pass"
        type="password"
        name="password"
        placeholder="contraseña"
        required
        autocomplete="current-password"
      />
      <button type="submit" class="btn-primary">entrar</button>
    </form>

    <div class="login-divider"><span>o</span></div>

    <a href="/" class="btn-secondary">solo mirar</a>

    <p id="err" class="login-err" role="alert" aria-live="polite"></p>
    <p style="margin-top:28px;font-size:0.72rem;color:var(--muted);">
      <a href="/aviso-legal.html" style="color:var(--muted);">aviso legal</a>
    </p>
  </main>
  <script>
    if (new URLSearchParams(location.search).get('e')) {
      document.getElementById('err').textContent = 'usuario o contraseña incorrectos';
    }
  </script>
</body>
</html>
