<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bici · publicar</title>
  <link rel="icon" href="/icons/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="/icons/favicon-16.png" sizes="16x16" type="image/png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚲</text></svg>" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0d0c0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="bici" />
  <script>if('serviceWorker' in navigator){addEventListener('load',function(){navigator.serviceWorker.register('/sw.js');});}</script>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/toast.css" />
  <link rel="stylesheet" href="/css/buttons.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/composer.css" />
  <link rel="stylesheet" href="/css/pages-lite.css" />
</head>
<body class="compose-page">
  <div class="layout">
    <main class="main-col">
      <p class="compose-nav"><a href="/">← volver al timeline</a></p>
      <form id="composer" class="composer">
        <textarea id="text" placeholder="¿dónde dejaste la bici? añade una foto y la ubicación… usa #tags"></textarea>
        <div id="mediaPreview" class="media-preview"></div>
        <div class="composer-foot">
          <label class="file-btn">
            foto
            <input id="fileInput" type="file" accept="image/*" multiple hidden />
          </label>
          <button type="button" id="btnGeo" class="geo-btn rec-btn" aria-label="añadir ubicación">ubicación</button>
          <input type="text" id="locInput" class="loc-input" placeholder="nombre del sitio (opcional)" maxlength="120" aria-label="nombre del sitio" hidden />
          <button type="button" id="btnGeoClear" class="geo-clear link-btn" aria-label="quitar ubicación" title="quitar ubicación" hidden>✕</button>
          <span class="grow"></span>
          <button type="submit" id="btnPost" class="btn-primary">publicar</button>
        </div>
      </form>
    </main>
  </div>

  <script type="module" src="/compose.js"></script>
</body>
</html>
