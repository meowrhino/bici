name = "bici"
main = "src/index.ts"
compatibility_date = "2024-09-23"

routes = [
  { pattern = "bici.meowrhino.studio", custom_domain = true }
]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "bici-db"
database_id = "5fa50253-10a8-4379-8669-31b7343a62a7"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "bici-storage"

# Rate limiting nativo de Workers (sin KV ni recurso externo). Defensa contra un
# bucle accidental que sature R2/D1 en las escrituras del dueño. Generoso: no
# molesta el uso normal. namespace_id es un id lógico; period solo admite 10 o 60.
[[unsafe.bindings]]
name = "WRITE_LIMITER"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 100, period = 60 }
